<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Badminton Pro - Neobrutalism</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <section id="pagePlayers" class="page active">
        <header><p>Let's play</p><h1>Manage Crew</h1></header>
        <div class="card card-gradient">
            <div class="input-group">
                <input type="text" id="gName" placeholder="ชื่อก๊วน...">
                <button class="btn-add" onclick="saveGroup()">+</button>
            </div>
            <div id="tags" class="tag-container"></div>
            <textarea id="pList" placeholder="ใส่ชื่อคนละบรรทัด..." rows="8"></textarea>
            <button class="btn-black" onclick="startRandom()">Start Match 🚀</button>
        </div>
    </section>

    <section id="pageMatch" class="page">
        <header><p>Live Court</p><h1>Match Up</h1></header>
        <div id="noMatch" class="card" style="text-align:center; color:#888;">ยังไม่มีการสุ่มคู่</div>
        <div id="matchDisplay" style="display:none;">
            <div class="card card-yellow">
                <div class="match-header">
                    <span id="roundLabel" style="font-weight:800; font-size:18px;">MATCH 1</span>
                    <div class="status-dot"></div>
                </div>
                <div class="match-row">
                    <div class="team-box">
                        <span id="p1" class="name"></span>
                        <span id="p2" class="name"></span>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="team-box">
                        <span id="p3" class="name"></span>
                        <span id="p4" class="name"></span>
                    </div>
                </div>
                <div class="control-grid">
                    <button class="btn-nav" onclick="prev()">ย้อนกลับ</button>
                    <button class="btn-nav btn-next" onclick="next()">คู่ถัดไป ➔</button>
                </div>
                <button class="btn-score" onclick="openScore()">⚔️ Open Scoreboard</button>
            </div>
        </div>
    </section>

    <section id="pageHistory" class="page">
        <header><p>Records</p><h1>Stats</h1></header>
        <div id="histList"></div>
    </section>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active" onclick="switchPage('pagePlayers', this)">
        <span class="nav-icon">👥</span><span class="nav-text">CREW</span>
    </a>
    <a href="#" class="nav-item" onclick="switchPage('pageMatch', this)">
        <span class="nav-icon">🏸</span><span class="nav-text">MATCH</span>
    </a>
    <a href="#" class="nav-item" onclick="switchPage('pageHistory', this)">
        <span class="nav-icon">📊</span><span class="nav-text">STATS</span>
    </a>
</nav>

<div id="scoreOverlay" style="display:none; position:fixed; inset:0; z-index:2000; flex-direction: column; touch-action: none;">
    <div class="score-side red-side" style="flex:1; position:relative; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <div onclick="removePoint(1)" style="position:absolute; left:0; top:0; width:50%; height:100%; z-index:10;"></div>
        <div onclick="addPoint(1)" style="position:absolute; right:0; top:0; width:50%; height:100%; z-index:10;"></div>
        <div id="pNameRed" style="font-weight:800; font-size:20px; margin-bottom:5px;">TEAM A</div>
        <div id="s1" class="score-num" style="font-size:150px; font-weight:900;">0</div>
    </div>

    <div class="score-side blue-side" style="flex:1; position:relative; display:flex; flex-direction:column; justify-content:center; align-items:center; border-top:4px solid rgba(0,0,0,0.1);">
        <div onclick="removePoint(2)" style="position:absolute; left:0; top:0; width:50%; height:100%; z-index:10;"></div>
        <div onclick="addPoint(2)" style="position:absolute; right:0; top:0; width:50%; height:100%; z-index:10;"></div>
        <div id="pNameBlue" style="font-weight:800; font-size:20px; margin-bottom:5px;">TEAM B</div>
        <div id="s2" class="score-num" style="font-size:150px; font-weight:900;">0</div>
    </div>

    <div id="deuceStatus" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); pointer-events:none; z-index:2500; color:white; font-size:42px; font-weight:900; text-align:center; text-shadow: 4px 4px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000, 1px 1px 0px #000; letter-spacing: 2px;"></div>

    <div id="deuceChoiceModal" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:white; border:4px solid black; padding:25px; border-radius:25px; box-shadow:8px 8px 0px black; z-index:3000; width:80%; max-width:320px; text-align:center;">
        <h2 style="margin:0 0 10px; font-size:24px;">DEUCE! 🔥</h2>
        <button class="btn-black" onclick="setDeuceMode(true)" style="margin-bottom:10px; width:100%;">Deuce (ต่อ)</button>
        <button class="btn-black" onclick="forceEndGame()" style="background:#EEE; color:black; border:2px solid black; width:100%;">End Game (พอแค่นี้)</button>
    </div>

    <div id="winnerModal" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:white; border:5px solid black; padding:30px; border-radius:30px; box-shadow:10px 10px 0px black; z-index:4000; width:85%; max-width:340px; text-align:center;">
        <div style="font-size:50px; margin-bottom:10px;">🏆</div>
        <h1 id="winnerText" style="margin:0; font-size:28px; font-weight:800;">RED TEAM</h1>
        <p style="margin:10px 0 20px; font-weight:600;">IS THE WINNER!</p>
        <button class="btn-black" onclick="closeWinnerModal()" style="width:100%; background:#D7FF5A; color:black;">กลับหน้าสุ่มคู่ 🚀</button>
    </div>
</div>

<script src="script.js"></script>
</body>

</body>
</html>
