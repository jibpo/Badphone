<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Badminton Pro - Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<div class="app-container">
    <section id="pagePlayers" class="page active">
        <header><p>Let's play</p><h1>Badminton Match🔥</h1></header>
        <div class="card card-gradient">
            <div class="input-group">
                <input type="text" id="gName" placeholder="ชื่อก๊วน...">
                <button class="btn-add" onclick="saveGroup()">+</button>
            </div>
            <div id="tags" class="tag-container"></div>
            <textarea id="pList" placeholder="ใส่ชื่อคนละบรรทัด..." rows="8"></textarea>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 15px;">
            <button class="btn-black" onclick="showClearModal()" style="flex: 1; background: #f0f0f0; color: black; font-size: 14px !important; display: flex; align-items: center; justify-content: center; gap: 5px;">
                ล้าง 🗑️
            </button>
            <button class="btn-black" onclick="startRandom()" style="flex: 2;">
                Start Match 🚀
            </button>
        </div>

        <div id="clearConfirmModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px);">
            <div class="card" style="background:#FFF; border:4px solid #000; padding:30px; border-radius:25px; box-shadow:10px 10px 0px #000; width:100%; max-width:320px; text-align:center;">
                <div style="font-size:45px; margin-bottom:10px;">🗑️</div>
                <h2 style="margin:0 0 10px; font-weight:800; font-size:22px;">ล้างรายชื่อ?</h2>
                <p style="margin-bottom:25px; font-size:14px; font-weight:600; color:#555;">คุณต้องการลบรายชื่อทั้งหมดในช่องพิมพ์ใช่หรือไม่?</p>
                <div style="display:flex; gap:12px;">
                    <button class="btn-nav" onclick="hideClearModal()" style="flex:1; border-radius:15px; padding:12px;">ยกเลิก</button>
                    <button class="btn-nav" onclick="executeClear()" style="flex:1; background:#000; color:#FFF; border-radius:15px; padding:12px; font-weight:800;">ยืนยันล้าง</button>
                </div>
            </div>
        </div>
    </section>

    <section id="pageMatch" class="page">
        <header><p>Live Court</p><h1>Match Up</h1></header>
        <div id="noMatch" class="card" style="text-align:center; color:#888;">ยังไม่มีการสุ่มคู่</div>
        <div id="matchDisplay" style="display:none;">
            <div class="card card-yellow">
                <div style="font-weight:800; font-size:22px; margin-bottom:15px;" id="roundLabel">MATCH 1</div>
                <div class="match-row">
                    <div class="team-box"><span id="p1" class="name"></span><span id="p2" class="name"></span></div>
                    <div class="vs-badge">VS</div>
                    <div class="team-box"><span id="p3" class="name"></span><span id="p4" class="name"></span></div>
                </div>
                <div class="control-grid">
                    <button class="btn-nav" onclick="prev()">ย้อนกลับ</button>
                    <button class="btn-nav btn-next" onclick="next()">คู่ถัดไป ➔</button>
                </div>
                <button class="btn-black" onclick="openScore()" style="font-size:14px !important; padding:12px; margin-top:10px;">⚔️ Open Scoreboard</button>
            </div>
        </div>
    </section>

    <section id="pageHistory" class="page">
        <header><p>Records</p><h1>Stats</h1></header>
        <div id="histList"></div>
    </section>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active" onclick="switchPage('pagePlayers', this)">
        <span class="nav-icon">👥</span><span class="nav-text">PLAYER</span>
    </a>
    <a href="#" class="nav-item" onclick="switchPage('pageMatch', this)">
        <span class="nav-icon">🏸</span><span class="nav-text">MATCH</span>
    </a>
    <a href="#" class="nav-item" onclick="switchPage('pageHistory', this)">
        <span class="nav-icon">📊</span><span class="nav-text">STATS</span>
    </a>
</nav>

<div id="scoreOverlay">
    <div class="score-side red-side">
        <div onclick="removePoint(1)" class="tap-area-minus"></div>
        <div onclick="addPoint(1)" class="tap-area-plus"></div>
        <div class="score-content-wrapper">
            <div id="pNameRed" class="team-label">TEAM A</div>
            <span id="shuttle1" class="shuttle-white-top">🏸</span>
            <div id="s1" class="score-num">0</div>
        </div>
    </div>

    <div class="score-side blue-side">
        <div onclick="removePoint(2)" class="tap-area-minus"></div>
        <div onclick="addPoint(2)" class="tap-area-plus"></div>
        <div class="score-content-wrapper">
            <div id="pNameBlue" class="team-label">TEAM B</div>
            <span id="shuttle2" class="shuttle-white-top">🏸</span>
            <div id="s2" class="score-num">0</div>
        </div>
    </div>

    <div id="deuceStatus"></div>
    <div onclick="closeScore()" class="btn-close-score">✕</div>

    <div id="deuceChoiceModal" class="modal">
        <h2 style="margin:0 0 10px;">DEUCE! 🔥</h2>
        <button class="btn-black" onclick="setDeuceMode(true)" style="margin-bottom:8px;">เล่นดิวส์ต่อ</button>
        <button class="btn-black" onclick="forceEndGame()" style="background:#EEE; color:black; border:2px solid black;">จบเกมทันที</button>
    </div>

    <div id="winnerModal" class="modal">
        <div style="font-size:40px;">🏆</div>
        <h2 id="winnerText" style="margin:5px 0;">TEAM A</h2>
        <p style="margin-bottom:15px; font-weight:600; color:#666;">ผู้ชนะ!</p>
        <button class="btn-black" onclick="closeWinnerModal()">ตกลง</button>
    </div>
</div>

<div id="confirmModal">
    <div class="card" style="width:100%; max-width:300px; text-align:center;">
        <h2 style="margin:0 0 10px;">ลบก๊วน?</h2>
        <p id="confirmMsg" style="margin-bottom:20px; font-size:14px;"></p>
        <div style="display:flex; gap:10px;">
            <button class="btn-nav" onclick="closeConfirm()" style="flex:1;">ยกเลิก</button>
            <button class="btn-nav btn-next" id="btnConfirmDelete" style="flex:1; background:#FF3B30; color:white;">ลบ</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
